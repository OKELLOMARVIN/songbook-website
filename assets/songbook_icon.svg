<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#87CEEB" rx="20"/>
  
  <!-- Ornate frame border -->
  <rect x="40" y="40" width="120" height="120" fill="#F5E6D3" stroke="#4A90E2" stroke-width="3" rx="10"/>
  
  <!-- Inner decorative border -->
  <rect x="45" y="45" width="110" height="110" fill="#FFF8E7" stroke="#5B9BD5" stroke-width="1.5" rx="6"/>
  
  <!-- Upper musical staff (5 lines) -->
  <line x1="55" y1="72" x2="145" y2="72" stroke="#4A90E2" stroke-width="1.5"/>
  <line x1="55" y1="78" x2="145" y2="78" stroke="#4A90E2" stroke-width="1.5"/>
  <line x1="55" y1="84" x2="145" y2="84" stroke="#4A90E2" stroke-width="1.5"/>
  <line x1="55" y1="90" x2="145" y2="90" stroke="#4A90E2" stroke-width="1.5"/>
  <line x1="55" y1="96" x2="145" y2="96" stroke="#4A90E2" stroke-width="1.5"/>
  
  <!-- Treble clef on upper staff -->
  <g transform="translate(65, 84)">
    <path d="M 0 -2 Q -2 0.5 -2 3.5 Q -2 6.5 0 8 Q 2 9.5 4 8 Q 6 6.5 6 3.5 Q 6 -2 2.5 -5 Q 0 -7.5 -2 -6 Q -3.5 -5.5 -3.5 -3.5 Q -3.5 -1.5 -2 0" 
          fill="none" stroke="#4A90E2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Musical notes on upper staff -->
  <!-- Quarter note -->
  <ellipse cx="85" cy="84" rx="3.5" ry="2.5" fill="#4A90E2" transform="rotate(-25 85 84)"/>
  <line x1="88.5" y1="83" x2="88.5" y2="68" stroke="#4A90E2" stroke-width="2"/>
  
  <!-- Eighth note -->
  <ellipse cx="100" cy="78" rx="3.5" ry="2.5" fill="#4A90E2" transform="rotate(-25 100 78)"/>
  <line x1="103.5" y1="77" x2="103.5" y2="62" stroke="#4A90E2" stroke-width="2"/>
  <path d="M 103.5 62 Q 107 61 109 64" fill="none" stroke="#4A90E2" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Half note -->
  <ellipse cx="117" cy="90" rx="3.5" ry="2.5" fill="none" stroke="#4A90E2" stroke-width="1.8" transform="rotate(-25 117 90)"/>
  <line x1="120.5" y1="89" x2="120.5" y2="74" stroke="#4A90E2" stroke-width="2"/>
  
  <!-- Lower musical staff (4 lines) -->
  <line x1="55" y1="115" x2="145" y2="115" stroke="#4A90E2" stroke-width="1.5"/>
  <line x1="55" y1="121" x2="145" y2="121" stroke="#4A90E2" stroke-width="1.5"/>
  <line x1="55" y1="127" x2="145" y2="127" stroke="#4A90E2" stroke-width="1.5"/>
  <line x1="55" y1="133" x2="145" y2="133" stroke="#4A90E2" stroke-width="1.5"/>
  
  <!-- Notes on lower staff -->
  <ellipse cx="63" cy="121" rx="3" ry="2.5" fill="#4A90E2" transform="rotate(-25 63 121)"/>
  <line x1="66" y1="120" x2="66" y2="109" stroke="#4A90E2" stroke-width="1.8"/>
  
  <ellipse cx="74" cy="127" rx="3" ry="2.5" fill="#4A90E2" transform="rotate(-25 74 127)"/>
  <line x1="77" y1="126" x2="77" y2="115" stroke="#4A90E2" stroke-width="1.8"/>
  
  <ellipse cx="85" cy="121" rx="3" ry="2.5" fill="none" stroke="#4A90E2" stroke-width="1.6" transform="rotate(-25 85 121)"/>
  <line x1="88" y1="120" x2="88" y2="109" stroke="#4A90E2" stroke-width="1.8"/>
  
  <!-- Quill feather (improved and more elegant) -->
  <g transform="translate(122, 108) rotate(-35)">
    <!-- Main feather shape -->
    <ellipse cx="0" cy="0" rx="7" ry="26" fill="#6DB4E8" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="5" ry="24" fill="#87CEEB" opacity="0.8"/>
    <ellipse cx="-1" cy="0" rx="2.5" ry="22" fill="#A8D8F0" opacity="0.6"/>
    
    <!-- Feather barbs (left side) -->
    <line x1="-5" y1="-16" x2="-8" y2="-14" stroke="#5B9BD5" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    <line x1="-5" y1="-12" x2="-8" y2="-10" stroke="#5B9BD5" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    <line x1="-5" y1="-8" x2="-8" y2="-6" stroke="#5B9BD5" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    <line x1="-5" y1="-4" x2="-8" y2="-2" stroke="#5B9BD5" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="-7" y2="2" stroke="#5B9BD5" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    <line x1="-5" y1="4" x2="-7" y2="6" stroke="#5B9BD5" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    
    <!-- Feather barbs (right side) -->
    <line x1="5" y1="-16" x2="8" y2="-14" stroke="#5B9BD5" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    <line x1="5" y1="-12" x2="8" y2="-10" stroke="#5B9BD5" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    <line x1="5" y1="-8" x2="8" y2="-6" stroke="#5B9BD5" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    <line x1="5" y1="-4" x2="8" y2="-2" stroke="#5B9BD5" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    <line x1="5" y1="0" x2="7" y2="2" stroke="#5B9BD5" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    <line x1="5" y1="4" x2="7" y2="6" stroke="#5B9BD5" stroke-width="1" opacity="0.7" stroke-linecap="round"/>
    
    <!-- Center shaft highlight -->
    <line x1="0" y1="-22" x2="0" y2="20" stroke="#A8D8F0" stroke-width="0.8" opacity="0.8"/>
    
    <!-- Quill nib (pointed tip) -->
    <path d="M -1.2 20 L 0 28 L 1.2 20 Z" fill="#2E5C8A"/>
    <path d="M -0.8 20 L 0 26 L 0.8 20" fill="#4A90E2" opacity="0.5"/>
    <line x1="0" y1="20" x2="0" y2="26" stroke="#87CEEB" stroke-width="0.6"/>
  </g>
  
  <!-- Ink well (improved design) -->
  <g transform="translate(145, 142)">
    <!-- Ink well base -->
    <ellipse cx="0" cy="2.5" rx="8" ry="4" fill="#2E5C8A"/>
    <!-- Ink well body -->
    <path d="M -7 -6 Q -7 0 -8 2.5 L 8 2.5 Q 7 0 7 -6 Z" fill="#4A90E2" stroke="#2E5C8A" stroke-width="1.2"/>
    <!-- Ink well top opening -->
    <ellipse cx="0" cy="-6" rx="7" ry="3" fill="#5B9BD5" stroke="#2E5C8A" stroke-width="1.2"/>
    <!-- Ink surface -->
    <ellipse cx="0" cy="-5.5" rx="5.5" ry="2.5" fill="#2E5C8A" opacity="0.8"/>
    <!-- Highlight on glass -->
    <ellipse cx="-2.5" cy="-2.5" rx="1.5" ry="3" fill="#87CEEB" opacity="0.3"/>
  </g>
  
  <!-- Corner decorative elements (Renaissance style) -->
  <g transform="translate(50, 50)">
    <circle cx="0" cy="0" r="3.5" fill="#5B9BD5"/>
    <path d="M -2 5 Q 0 3 2 5" fill="none" stroke="#5B9BD5" stroke-width="1" stroke-linecap="round"/>
    <path d="M 5 -2 Q 3 0 5 2" fill="none" stroke="#5B9BD5" stroke-width="1" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(150, 50)">
    <circle cx="0" cy="0" r="3.5" fill="#5B9BD5"/>
    <path d="M -2 5 Q 0 3 2 5" fill="none" stroke="#5B9BD5" stroke-width="1" stroke-linecap="round"/>
    <path d="M -5 -2 Q -3 0 -5 2" fill="none" stroke="#5B9BD5" stroke-width="1" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(50, 150)">
    <circle cx="0" cy="0" r="3.5" fill="#5B9BD5"/>
    <path d="M -2 -5 Q 0 -3 2 -5" fill="none" stroke="#5B9BD5" stroke-width="1" stroke-linecap="round"/>
    <path d="M 5 -2 Q 3 0 5 2" fill="none" stroke="#5B9BD5" stroke-width="1" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(150, 150)">
    <circle cx="0" cy="0" r="3.5" fill="#5B9BD5"/>
    <path d="M -2 -5 Q 0 -3 2 -5" fill="none" stroke="#5B9BD5" stroke-width="1" stroke-linecap="round"/>
    <path d="M -5 -2 Q -3 0 -5 2" fill="none" stroke="#5B9BD5" stroke-width="1" stroke-linecap="round"/>
  </g>
  
  <!-- Subtle parchment texture -->
  <rect x="45" y="45" width="110" height="110" fill="url(#parchmentTexture)" opacity="0.03" rx="6"/>
  
  <defs>
    <pattern id="parchmentTexture" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <line x1="0" y1="10" x2="20" y2="10" stroke="#C4A571" stroke-width="0.3"/>
    </pattern>
  </defs>
</svg>